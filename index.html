<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sana Bir Sorum Var! ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            font-family: sans-serif;
            overflow: hidden;
            position: relative;
        }

        h1 {
            position: absolute;
            top: 20%;
            width: 90%;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 15px rgba(0,0,0,1);
            z-index: 10;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            position: absolute;
            z-index: 9999;
        }

        #evetBtn { background-color: #2ecc71; color: white; left: 30%; top: 55%; }
        #hayirBtn { background-color: #e74c3c; color: white; right: 30%; top: 55%; transition: 0.1s; }
    </style>
</head>
<body>

    <audio id="muzik" preload="auto">
        <source src="./sarki.mp3" type="audio/mpeg">
    </audio>

    <h1 id="txt">Ben Senden Hoşlanıyorum, <br>Benimle çıkar mısın? ❤️</h1>

    <button id="evetBtn" onclick="onayla()" class="btn">EVET</button>
    <button id="hayirBtn" onmouseover="kac()" onclick="kac()" class="btn">HAYIR</button>

    <script>
        function kac() {
            const b = document.getElementById('hayirBtn');
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 80);
            b.style.left = x + 'px';
            b.style.top = y + 'px';
        }

        function onayla() {
            const m = document.getElementById('muzik');
            
            // Sesi %100 yap
            m.volume = 1.0;
            
            // Oynatmayı dene
            var playPromise = m.play();

            if (playPromise !== undefined) {
                playPromise.then(_ => {
                    console.log("Müzik başarıyla başladı!");
                }).catch(error => {
                    // Eğer hata verirse sayfada bir yere dokunulmasını isteyip tekrar dener
                    console.log("Otomatik oynatma engellendi, manuel tetikleniyor.");
                    m.play();
                });
            }

            document.getElementById('txt').innerHTML = "Bende Seni Çok Seviyorum Yavrummm ❤️❤️❤️";
            document.getElementById('evetBtn').style.display = 'none';
            document.getElementById('hayirBtn').style.display = 'none';
        }
    </script>
</body>
</html>
